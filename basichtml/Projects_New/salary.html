<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salary Calculator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="salary.css" />
</head>
<body>

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <div class="card">

    <div class="title">
      <h1>Salary Calculator</h1>
      <p>Cool Animated Salary Calculator</p>
    </div>

    
    <div class="input-group">
      <label>Monthly Salary</label>
      <div class="input-box">
        <input type="number" id="monthlySalary" placeholder="Enter Monthly Salary">
        <span>₹</span>
      </div>
    </div>

  
    <div class="input-group">
      <label>Bonus / Extra Income</label>
      <div class="input-box">
        <input type="number" id="bonus" placeholder="Enter Bonus Amount">
        <span>₹</span>
      </div>
    </div>

   
    <div class="input-group">
      <label>Tax Percentage</label>
      <div class="input-box">
        <input type="number" id="tax" placeholder="Enter Tax %">
        <span>%</span>
      </div>
    </div>

   
    <button class="btn" onclick="calculateSalary()">
      Calculate Salary
    </button>

  
    <div class="result">
      <h2>Total Annual Salary</h2>

      <div class="salary" id="annualSalary">
        ₹0
      </div>

      <div class="monthly" id="monthlyResult">
        Monthly: ₹0
      </div>

      <div class="extra-box">

        <div class="small-card">
          <h3>After Tax</h3>
          <p id="afterTax">₹0</p>
        </div>

        <div class="small-card">
          <h3>Year Bonus</h3>
          <p id="bonusResult">₹0</p>
        </div>

      </div>
    </div>

  </div>

  <script src="salary.js"></script>
</body>
</html>
