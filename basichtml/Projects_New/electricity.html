<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electricity Bill Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="electricity.css" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4 main-card">
            <h3 class="text-center mb-4">⚡ Electricity Bill Calculator</h3>

            <input
              type="number"
              id="units"
              class="form-control mb-3"
              placeholder="Enter units"
            />

            <div class="d-flex">
              <button
                class="btn btn-primary w-50 me-2"
                onclick="calculateBill()"
              >
                Calculate
              </button>
              <button class="btn btn-danger w-50" onclick="resetForm()">
                Reset
              </button>
            </div>

            <div class="card result-card p-3 mt-3" id="resultCard">
              <p id="slab1"></p>
              <p id="slab2"></p>
              <p id="slab3"></p>
              <p id="slab4"></p>
              <hr />
              <p>Subtotal: ₹<span id="subtotal"></span></p>
              <p>Surcharge: ₹<span id="surcharge"></span></p>
              <h5>Total: ₹<span id="total"></span></h5>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="electricity.js"></script>
  </body>
</html>
