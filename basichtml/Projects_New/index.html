<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <body>

    <div class="w-25 bg-light rounded shadow border mx-auto mt-5 p-4">
        <h1 class="text-center mb-3 ">Age Calculator</h1>

        <form class="d-grid gap-3  flex-column w-100 align-items-center d-flex p-3">
            <label for="DOB" >Enter Your Date Of Birth</label>
            <input type="date" name="DOB" id="DOB"  class="form-control" />

            <label for="CurrentDate" >Choose Date</label>

            
            <input
             type="date"
            name="CurrentDate"
            id="CurrentDate"
            class="form-control"
            />
            <button type="submit" class="btn btn-primary">Calculate Age</button>
        </form>


        <div class="fw-bold text-center">
            Your Age is : <span id="MyAge">XX</span> Years
        </div>

        </div>
   

    </div>

















    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
