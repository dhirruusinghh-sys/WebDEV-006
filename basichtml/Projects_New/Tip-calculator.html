<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="tip-calculator.css">
</head>
<body>

  <div class="container">
    <h2>TIP CALCULATOR</h2>

    <label>Bill Amount (₹)</label>
    <input type="number" id="billAmount" placeholder="Enter amount">

    <label>How was the service?</label>
    <select id="service">
      <option value="">Select</option>
      <option value="0.25">25% - Top Notch</option>
      <option value="0.20">20% - Excellent</option>
      <option value="0.15">15% - Good</option>
      <option value="0.10">10% - Bad</option>
      <option value="0.05">5% - Worst</option>
    </select>

    <label>Number of People</label>
    <input type="number" id="people" placeholder="Enter number of people">

    <button onclick="calculateTip()">Calculate</button>

    <div id="result"></div>
  </div>

  <script src="tip-calculator.js"></script>
</body>
</html>
