<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joke Ka Pitara</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-light">

    <!-- Header -->
    <header class="bg-primary text-white text-center p-3 shadow">
      <h1 class="fw-bold m-0">
        😂 Jokes Ka Pitara 🤣
      </h1>
    </header>

    <!-- Main -->
    <main>
      <div class="container border mt-5 p-4 rounded-4 text-center">

        <div id="JokesSpace">

          <i class="bi bi-emoji-laughing display-1 text-warning"></i>

          <p id="setup" class="mt-4 fs-4 fw-bold text-warning">
            Teacher: Tum late kyu aaye?
          </p>

          <p id="delivery" class="fs-5 text-light">
            Student: Sir, sapne me school aa gaya tha 😅
          </p>

        </div>

        <!-- Button -->
        <div class="d-flex justify-content-center mt-4">
          <button class="btn btn-primary px-4 py-2 rounded-pill" onclick="GetNewJoke()">
            <i class="bi bi-arrow-repeat"></i>
            Get New Joke
          </button>
        </div>

      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
