<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Racer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="sky">

<div class="w-full h-screen flex flex-col">

    <!-- Header -->
    <div class="bg-yellow-300 p-3 flex justify-around text-xl font-bold">
        <div>🏆 Score: <span id="score">0</span></div>
        <div>⭐ Stars: <span id="stars">0</span></div>
        <div>❤️ Lives: <span id="lives">3</span></div>
    </div>

    <!-- Game Area -->
    <div id="gameArea" class="road flex-1 mx-auto w-[350px] border-4 border-white">

        <div class="lane left-[33%]"></div>
        <div class="lane left-[66%]"></div>

        <div class="cloud" style="top:20px;">☁️</div>
        <div class="cloud" style="top:100px;animation-delay:4s;">☁️</div>

        <div id="car" class="car bottom-5 left-[140px]">
            🚗
        </div>

    </div>

    <!-- Controls -->
    <div class="bg-blue-500 p-4 flex justify-center gap-4">

        <button id="leftBtn"
            class="bg-white px-6 py-3 rounded-xl font-bold">
            ⬅️
        </button>

        <button id="rightBtn"
            class="bg-white px-6 py-3 rounded-xl font-bold">
            ➡️
        </button>

    </div>
</div>

<div id="gameOver"
class="hidden fixed inset-0 bg-black/70 items-center justify-center">

    <div class="bg-white p-8 rounded-2xl text-center popup">

        <h1 class="text-4xl font-bold mb-4">
            Game Over 😢
        </h1>

        <button onclick="location.reload()"
        class="bg-green-500 text-white px-6 py-3 rounded-xl">
            Play Again
        </button>

    </div>

</div>


   
    <script src="script.js"></script>
</body>
</html>
