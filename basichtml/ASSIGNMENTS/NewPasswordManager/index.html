<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
   <h3><i class="bi bi-lock-fill"></i> Password Manager</h3>

    <div>
        <a href="index.html">Add</a>
        <a href="showPassword.html">View</a>
    </div>
</header>

<main class="container d-flex justify-content-center align-items-center">

    <div class="glass-card">

        <h4>Add New Password</h4>

        <form id="passForm">

                
            <input type="text" id="siteName" placeholder="🌐 Website">
             
            

            <input type="text" id="userName" placeholder="👤 Username">

            <div class="password-box">
                <input type="password" id="password" placeholder="🔑 Password">
                <button type="button" id="togglePass">👁</button>
            </div>

            <div class="btn-group">
                <button type="submit" class="save">Save</button>
                <button type="reset" class="clear">Clear</button>
            </div>

        </form>
    </div>

</main>

<script src="script.js"></script>
</body>
</html>
