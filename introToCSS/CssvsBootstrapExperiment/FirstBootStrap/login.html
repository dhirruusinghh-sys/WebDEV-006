<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <body class="bg-primary">
    <div class="d-lg-flex d-grid gap-5 justify-content-center align-items-center vh-100 ">
        <div  class="bg-light p-5" id="Login">
            <div class="border border-bottom p-3 d-flex align-items-center gap-3">
                <i class="bi bi-envelope-open"></i>
                <input type="text" placeholder="ENTER THE USERNAME" class="bg-transparent border">
            </div>
            <div class="border border-bottom p-3 d-flex align-items-center gap-3">
                <i class="bi bi-envelope"></i>
                <input type="email" placeholder="ENTER THE EMAIL" class="bg-transparent border">
            </div>
            <div class="border border-bottom p-3 d-flex align-items-center gap-3">
                <i class="bi bi-lock"></i>
                <input type="password" placeholder="ENTER THE PASSWORD" class="bg-transparent border">
        </div>
        <br>
        <br>
        <button class="btn btn-outline-danger w-100 ">Login</button>

        <div class="bg-light" id="Register">
            <div class="border border-bottom p-3 d-flex align-items-center gap-3">
                <i class="bi bi-envelope-open"></i>
                <input type="text" placeholder="ENTER THE USERNAME" class="bg-transparent border">
            </div>
            <div class="border border-bottom p-3 d-flex align-items-center gap-3">
                <i class="bi bi-envelope"></i>
                <input type="email" placeholder="ENTER THE EMAIL" class="bg-transparent border">
            </div>
            <div class="border border-bottom p-3 d-flex align-items-center gap-3">
                <i class="bi bi-lock"></i>
                <input type="password" placeholder="ENTER THE PASSWORD" class="bg-transparent border">
            </div>
            <br>
            <br>
        </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
