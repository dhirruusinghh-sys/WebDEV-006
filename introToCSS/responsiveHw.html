<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RICR Enquiry Form</title>
    <link rel="stylesheet" href="responsiveHw.css" />
  </head>

  <body>
    <header>
      <div class="logo">RICR</div>

      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">IDE</a>
        <a href="#">Contact Us</a>
      </nav>

      <div class="right-section">
        <div class="phone">📞 +91 7777777777</div>
        <a href="#" class="login-btn">Student Login</a>
      </div>
    </header>

    <div class="container">
      <div class="form-box">
        <h2>Enquiry Form</h2>
        <p>
          Have questions or need assistance? Fill out the form below to connect
          with our team and explore your opportunities.
        </p>

        <form>
          <div class="form-row">
            <div class="form-group">
              <label>Person Name*</label>
              <input type="text" placeholder="Person Name" />
            </div>

            <div class="form-group">
              <label>Contact Number*</label>
              <input type="text" placeholder="Contact Number" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email*</label>
              <input type="email" placeholder="Email" />
            </div>

            <div class="form-group">
              <label>Qualification*</label>
              <input type="text" placeholder="Qualification" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>College/School Name*</label>
              <input type="text" placeholder="College/School Name" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Year*</label>
              <select>
                <option>Year</option>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
              </select>
            </div>

            <div class="form-group">
              <label>Branch*</label>
              <input type="text" placeholder="Branch" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Interested in Which Course*</label> 
              <div class="courses">
                <label
                  ><input type="checkbox" /> Full Stack Web Development -
                  Placement Oriented</label
                >
                <label
                  ><input type="checkbox" /> Data Science with Python -
                  Placement Oriented</label
                >
                <label
                  ><input type="checkbox" /> Data Analytics with Python -
                  Placement Oriented</label
                >
                <label><input type="checkbox" /> Bussiness Analyst</label>
                <label><input type="checkbox" /> Python Programming</label>

                <label><input type="checkbox" /> Data Science</label>
                <label><input type="checkbox" /> Java Programming</label>
              </div>
            </div>

            <div class="form-group">
              <label>Source of Information</label>
              <select>
                <option>Select</option>
                <option>Google</option>
                <option>NewsPaper/Print Media</option>
                <option>Social Media</option>
                <option>Friends/Family</option>
              </select>

              <label style="margin-top: 10px">Name of Executive*</label>
              <select>
                <option>Select Executive</option>
              </select>
            </div>
          </div>

          <div class="submit-btn">
            <button type="submit">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
